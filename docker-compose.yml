services:
  api:
    container_name: api
    image: node:22-alpine
    working_dir: /usr/src/app
    ports:
      - '3000:3000'
    # waiting for mongo happens inside the app itself (retry in the db plugin)
    command: npm run dev
    init: true
    volumes:
      - .:/usr/src/app
    depends_on:
      - mongo
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=Host(`fastify.localhost`) && PathPrefix(`/api/v1`)'
      - 'traefik.http.routers.api.entrypoints=http'

  mongo:
    container_name: mongo
    image: 'bitnami/mongodb:8.0'
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - 'mongodb_data:/bitnami/mongodb'
    environment:
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.mongo.entrypoints=http'

  traefik:
    container_name: traefik
    image: traefik:v2.5.3
    command: --api.insecure=true --providers.docker --log.level=debug --accesslog=true
    ports:
      - '80:80'
      - '8080:8080'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    labels:
      - 'traefik.http.routers.traefik.entrypoints=http'

volumes:
  mongodb_data:
    driver: local
