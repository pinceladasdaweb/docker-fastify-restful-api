services:
  api:
    container_name: api
    image: node:22-alpine
    working_dir: /usr/src/app
    ports:
      - '3000:3000'
    # waiting for mongo happens inside the app itself (retry in the db plugin)
    command: npm run dev
    init: true
    volumes:
      - .:/usr/src/app
    depends_on:
      - mongo
    healthcheck:
      # explicit 127.0.0.1: busybox wget resolves localhost to ::1 (IPv6)
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.api.rule=Host(`fastify.localhost`) && PathPrefix(`/api/v1`)'
      - 'traefik.http.routers.api.entrypoints=http'
      - 'traefik.http.services.api.loadbalancer.server.port=3000'

  mongo:
    container_name: mongo
    image: 'mongo:8'
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - 'mongodb_data:/data/db'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}

  traefik:
    container_name: traefik
    image: traefik:v3
    command: --api.insecure=true --providers.docker --providers.docker.exposedbydefault=false --entrypoints.http.address=:80 --log.level=INFO --accesslog=true
    ports:
      - '80:80'
      - '8080:8080'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    labels:
      - 'traefik.http.routers.traefik.entrypoints=http'

volumes:
  mongodb_data:
    driver: local
